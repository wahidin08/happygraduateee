<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>happy graduate | shakira </title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            touch-action: none;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            font-family: 'Courier Prime', monospace;
        }

        .hearts-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .bg-heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.2);
            font-size: 1.5rem;
            animation: floatHeart var(--duration) linear infinite;
        }

        @keyframes floatHeart {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .photos-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
            display: none;
        }

        .photos-container.active {
            display: block;
        }

        .floating-photo {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            opacity: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: floatPhoto var(--duration) linear infinite;
            border: 3px solid rgba(255, 255, 255, 0.8);
        }

        @keyframes floatPhoto {
            0% { transform: translateY(110vh) rotate(-5deg); opacity: 0; }
            8% { opacity: 0.7; }
            92% { opacity: 0.7; }
            100% { transform: translateY(-15vh) rotate(5deg); opacity: 0; }
        }

        .music-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #ff6b8b;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255, 107, 139, 0.3);
            transition: all 0.3s ease;
        }

        .music-btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(255, 107, 139, 0.5); }
        .music-btn:active { transform: scale(0.95); }

        .music-btn.playing {
            animation: pulse 1.5s ease-in-out infinite;
            background: linear-gradient(135deg, #ff6b8b, #ff8fa3);
            border-color: #fff;
        }

        .music-btn.playing svg { fill: white; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 107, 139, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(255, 107, 139, 0.6); }
        }

        .music-icon { width: 24px; height: 24px; fill: #ff6b8b; }

        .container {
            z-index: 10;
            text-align: center;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        #text-area {
            position: absolute;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.7;
            background: linear-gradient(45deg, #D81B60, #880E4F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            text-align: center;
            width: 95%;
            max-width: 800px;
            text-shadow: 0 0 10px rgba(255, 192, 203, 0.5);
            padding: 10px;
            word-break: keep-all;
            white-space: pre-wrap;
            z-index: 11;
        }

        .ciee-message { font-size: 2.1rem !important; text-shadow: 0 0 20px rgba(216, 27, 96, 0.3) !important; }
        .text-enter { animation: textFocusIn 1.5s ease-out both; }
        .text-exit { animation: textBlurOut 1.2s ease-in both; }

        @keyframes textFocusIn {
            0% { filter: blur(15px); opacity: 0; transform: translateY(20px); }
            100% { filter: blur(0px); opacity: 1; transform: translateY(0); }
        }

        @keyframes textBlurOut {
            0% { filter: blur(0px); opacity: 1; transform: scale(1); }
            100% { filter: blur(20px); opacity: 0; transform: scale(1.1); }
        }

        #final-frame {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            z-index: 12;
        }

        .final-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .neon-heart-wrapper {
            width: 340px;
            height: 340px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        svg.neon-heart {
            width: 100%;
            height: 100%;
            overflow: visible;
            position: relative;
            z-index: 15;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.3));
        }

        .heart-path {
            fill: rgba(255, 255, 255, 0.95);
            stroke: #ffffff;
            stroke-width: 16;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transform-origin: center;
            transform: scale(1);
        }

        @keyframes professionalStroke {
            0% { stroke: #ffb6c1; stroke-width: 16; filter: drop-shadow(0 0 8px #ffb6c1) drop-shadow(0 0 16px #ffb6c1) drop-shadow(0 0 24px #ffb6c1); }
            15% { stroke: #ff8fa3; stroke-width: 16; filter: drop-shadow(0 0 12px #ff8fa3) drop-shadow(0 0 24px #ff8fa3) drop-shadow(0 0 36px #ff8fa3); }
            30% { stroke: #ff6b8b; stroke-width: 16; filter: drop-shadow(0 0 14px #ff6b8b) drop-shadow(0 0 28px #ff6b8b) drop-shadow(0 0 42px #ff6b8b); }
            45% { stroke: #ff477e; stroke-width: 16; filter: drop-shadow(0 0 16px #ff477e) drop-shadow(0 0 32px #ff477e) drop-shadow(0 0 48px #ff477e); }
            60% { stroke: #ff2d6a; stroke-width: 16; filter: drop-shadow(0 0 18px #ff2d6a) drop-shadow(0 0 36px #ff2d6a) drop-shadow(0 0 54px #ff2d6a); }
            75% { stroke: #ff8fa3; stroke-width: 16; filter: drop-shadow(0 0 16px #ff8fa3) drop-shadow(0 0 32px #ff8fa3) drop-shadow(0 0 48px #ff8fa3); }
            90% { stroke: #ffb6c1; stroke-width: 16; filter: drop-shadow(0 0 14px #ffb6c1) drop-shadow(0 0 28px #ffb6c1) drop-shadow(0 0 42px #ffb6c1); }
            100% { stroke: #ffb6c1; stroke-width: 16; filter: drop-shadow(0 0 18px #ffb6c1) drop-shadow(0 0 36px #ffb6c1) drop-shadow(0 0 54px #ffb6c1); }
        }

        @keyframes heartReveal {
            0% { opacity: 0; transform: scale(1); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes preEntryGlow {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.7; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        .heart-text {
            position: absolute;
            z-index: 16;
            font-size: 1.8rem;
            color: #ff2d6a;
            font-weight: bold;
            text-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 6px rgba(255, 255, 255, 0.9), 0 0 8px rgba(255, 255, 255, 0.7), 0 0 10px rgba(255, 255, 255, 0.5), 0 0 12px rgba(255, 255, 255, 0.4), 0 0 14px rgba(255, 255, 255, 0.3);
            text-align: center;
            width: 75%;
            line-height: 1.3;
            opacity: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            padding: 0 10px;
            letter-spacing: 1px;
        }

        @keyframes textFadeIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes textNeonPulse {
            0%, 100% { text-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 6px rgba(255, 255, 255, 0.9), 0 0 8px rgba(255, 255, 255, 0.7), 0 0 10px rgba(255, 255, 255, 0.5), 0 0 12px rgba(255, 255, 255, 0.4), 0 0 14px rgba(255, 255, 255, 0.3); }
            50% { text-shadow: 0 0 3px #fff, 0 0 6px #fff, 0 0 9px rgba(255, 255, 255, 0.9), 0 0 12px rgba(255, 255, 255, 0.7), 0 0 15px rgba(255, 255, 255, 0.5), 0 0 18px rgba(255, 255, 255, 0.4), 0 0 21px rgba(255, 255, 255, 0.3); }
        }

        @keyframes textColorPulse {
            0%, 100% { color: #ff2d6a; }
            50% { color: #ff477e; }
        }

        .light-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 13;
            animation: particleFloat 1.5s ease-out forwards;
        }

        @keyframes particleFloat {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        @media (max-width: 480px) {
            .neon-heart-wrapper { width: 260px; height: 260px; }
            #text-area { font-size: 1.5rem; }
            .ciee-message { font-size: 1.8rem !important; }
            .heart-text { font-size: 1.4rem; width: 70%; letter-spacing: 0.5px; }
            .music-btn { width: 45px; height: 45px; bottom: 15px; left: 15px; }
            .music-icon { width: 20px; height: 20px; }
            .floating-photo { width: 60px; height: 60px; }
        }

        @media (min-width: 768px) {
            .neon-heart-wrapper { width: 380px; height: 380px; }
            .heart-text { font-size: 2.1rem; letter-spacing: 1.2px; }
            .floating-photo { width: 90px; height: 90px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <audio id="bg-music" loop>
        <source src="https://github.com/wahidin08/sempurnav2/raw/c5a77dc1752db657588656be998f0098a908d6f0/Sempurna%20-%20Andra%20And%20The%20BackBone%20_%20Lirik%20Lagu.mp3" type="audio/mpeg">
    </audio>

    <button class="music-btn" id="music-btn" onclick="toggleMusic()">
        <svg class="music-icon" viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
    </button>

    <div class="hearts-container" id="hearts-container"></div>
    <div class="photos-container" id="photos-container"></div>
    
    <div class="container">
        <div id="text-area"></div>

        <div id="final-frame">
            <div class="final-content">
                <div class="neon-heart-wrapper" id="heart-wrapper">
                    <svg class="neon-heart" viewBox="0 0 512 512">
                        <path class="heart-path" d="M256 448l-30.164-27.211C118.718 322.442 48 258.61 48 179.095 48 114.221 97.918 64 162.4 64c36.399 0 70.717 16.742 93.6 43.947C278.882 80.742 313.199 64 349.6 64 414.082 64 464 114.221 464 179.095c0 79.516-70.719 143.348-177.836 241.694L256 448z"/>
                    </svg>
                    <div class="heart-text" id="heart-text">
                        happy<br>graduate❤
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const messages = [
            { text: "Halo shakira...", duration: 2800 },
            { text: "Ciee yang udahh luluss...", duration: 2800 },
            { text: "Selamat yaaa..", duration: 2800 },
            { text: "semoga semua wishlist sudah tercapai yaa..", duration: 3500 },
            { text: "dan jika ada yng belum tercapai<br>ayoo kita wujudin wishlist kita berdua bareng²", duration: 4500 },
            { text: "aku sendiri banyak banget wishlist yng belum kesampean<br>dan aku mau wujudin itu bareng kamu", duration: 4500 },
            { text: "kayak keliling Europa,liat aurora, banyak dehh", duration: 3500 },
            { text: "semoga kesampean yaa bareng sama kamu..", duration: 3500 },
            { text: "dan sebelum itu semua terjadi semogaa<br>kita masih   tetep bersama yaa...", duration: 4500 },
            { text: "Love you sayang", duration: 2800 }
        ];

        const textArea = document.getElementById('text-area');
        const finalFrame = document.getElementById('final-frame');
        const heartWrapper = document.getElementById('heart-wrapper');
        const heartPath = document.querySelector('.heart-path');
        const heartText = document.getElementById('heart-text');
        const musicBtn = document.getElementById('music-btn');
        const bgMusic = document.getElementById('bg-music');
        const photosContainer = document.getElementById('photos-container');
        let index = 0;
        let isPlaying = false;
        let photosCreated = false;

        const photos = ['gambar1.jpg', 'gambar2.jpg', 'gambar3.jpg', 'gambar4.jpg', 'gambar5.jpg'];

        function toggleMusic() {
            if (isPlaying) {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
                isPlaying = false;
            } else {
                bgMusic.play().then(() => {
                    musicBtn.classList.add('playing');
                    isPlaying = true;
                }).catch(e => console.log("Audio play failed:", e));
            }
        }

        function showNextMessage() {
            if (index < messages.length) {
                const currentMsg = messages[index];
                textArea.className = '';
                textArea.innerHTML = currentMsg.text;
                if (index === 1) textArea.classList.add('ciee-message');
                void textArea.offsetWidth; 
                textArea.classList.add('text-enter');
                textArea.style.opacity = '1';

                setTimeout(() => {
                    textArea.classList.remove('text-enter');
                    textArea.classList.add('text-exit');
                    setTimeout(() => {
                        index++;
                        showNextMessage();
                    }, 1200);
                }, currentMsg.duration);
            } else {
                textArea.style.display = 'none';
                finalFrame.style.display = 'flex';
                setTimeout(() => { 
                    finalFrame.style.opacity = '1';
                    startProfessionalHeartAnimation();
                    showFloatingPhotos();
                }, 100);
            }
        }

        function createBackgroundHearts() {
            const container = document.getElementById('hearts-container');
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerHTML = '❤';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.setProperty('--duration', (Math.random() * 10 + 10) + 's');
                heart.style.animationDelay = Math.random() * 10 + 's';
                heart.style.fontSize = (Math.random() * 1 + 1) + 'rem';
                container.appendChild(heart);
            }
        }

        function showFloatingPhotos() {
            photosContainer.classList.add('active');
            if (!photosCreated) {
                for (let i = 0; i < 15; i++) {
                    const photoIndex = i % 5;
                    const img = document.createElement('img');
                    img.classList.add('floating-photo');
                    img.src = photos[photoIndex];
                    img.alt = 'Foto ' + (photoIndex + 1);
                    img.style.left = Math.random() * 90 + 5 + 'vw';
                    img.style.setProperty('--duration', (Math.random() * 6 + 12) + 's');
                    img.style.animationDelay = Math.random() * 15 + 's';
                    img.style.transform = 'rotate(' + (Math.random() * 20 - 10) + 'deg)';
                    photosContainer.appendChild(img);
                }
                photosCreated = true;
            }
        }

        function startProfessionalHeartAnimation() {
            heartPath.style.opacity = '0';
            heartPath.style.transform = 'scale(1)';
            heartText.style.opacity = '0';
            heartText.style.transform = 'translate(-50%, -50%) scale(1)';
            createPreEntryAnimation();
            
            setTimeout(() => {
                heartPath.style.animation = 'heartReveal 1.2s ease-out forwards';
                heartPath.style.opacity = '1';
                setTimeout(() => {
                    heartPath.style.animation = 'professionalStroke 3s ease-in-out infinite';
                    setTimeout(() => {
                        heartText.style.animation = 'textFadeIn 1s ease-out forwards, textNeonPulse 2.5s ease-in-out infinite, textColorPulse 3s ease-in-out infinite';
                        heartText.style.opacity = '1';
                    }, 300);
                    createLightParticles();
                }, 1200);
            }, 1500);
        }

        function createPreEntryAnimation() {
            const preEntryGlow = document.createElement('div');
            preEntryGlow.classList.add('pre-entry-effect');
            preEntryGlow.style.cssText = 'position:absolute;width:100%;height:100%;border-radius:50%;animation:preEntryGlow 1.5s ease-out forwards;background:radial-gradient(circle, rgba(255,182,193,0.8) 0%, rgba(255,192,203,0.6) 30%, rgba(255,209,220,0.4) 60%, transparent 100%)';
            heartWrapper.appendChild(preEntryGlow);
            
            const colors = ['#ffb6c1', '#ff8fa3', '#ff6b8b', '#ff477e', '#ff2d6a'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('light-particle');
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.cssText = `background-color:${color};box-shadow:0 0 10px ${color};left:170px;top:170px;width:${3+Math.random()*5}px;height:${3+Math.random()*5}px`;
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 50 + Math.random() * 80;
                    particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                    particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                    heartWrapper.appendChild(particle);
                    setTimeout(() => particle.remove(), 1500);
                }, i * 35);
            }
            setTimeout(() => preEntryGlow.remove(), 1500);
        }

        function createLightParticles() {
            const colors = ['#ffb6c1', '#ff8fa3', '#ff6b8b', '#ff477e', '#ff2d6a'];
            setInterval(() => {
                if (Math.random() > 0.6) {
                    for (let i = 0; i < 2; i++) {
                        const particle = document.createElement('div');
                        particle.classList.add('light-particle');
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        particle.style.cssText = `background-color:${color};box-shadow:0 0 8px ${color};left:170px;top:170px;width:3px;height:3px`;
                        const angle = Math.random() * Math.PI * 2;
                        particle.style.setProperty('--tx', Math.cos(angle) * 35 + 'px');
                        particle.style.setProperty('--ty', Math.sin(angle) * 35 + 'px');
                        heartWrapper.appendChild(particle);
                        setTimeout(() => particle.remove(), 1500);
                    }
                }
            }, 1000);
        }

        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        window.onload = function() {
            createBackgroundHearts();
            setTimeout(showNextMessage, 800);
        };
    </script>
</body>
</html>
